<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal del Guardia | Área de Registro</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #1a2a3a; 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        .header h1 {
            font-size: 22px;
            color: #3498db;
            margin: 0;
            text-transform: uppercase;
        }

        .header .aviso-registro {
            font-size: 13px;
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.15);
            padding: 6px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
            font-weight: bold;
            border: 1px solid #e74c3c;
        }

        /* LEYENDA DE SEGURIDAD */
        .leyenda {
            width: 100%;
            max-width: 500px;
            text-align: center;
            font-size: 18px;
            font-weight: 900;
            color: #f1c40f;
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-transform: uppercase;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(241, 196, 15, 0.3);
            padding-bottom: 10px;
        }

        .grid-operativa {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .btn-registro {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px 10px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 13px;
            text-align: center;
            transition: transform 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-registro:active {
            transform: scale(0.95);
        }

        .btn-registro span {
            font-size: 35px;
            margin-bottom: 10px;
        }

        /* Colores operativos */
        .cierre { background: #2980b9; }  
        .acceso { background: #27ae60; }  
        .motos  { background: #f39c12; }  
        .ventas { background: #8e44ad; } 
        .patrullaje { background: #2980b9; }
        .arribos { background: #27ae60; }  
        
        /* Botón de Checador/Recorrido (Ocupa todo el ancho) */
        .checador { 
            background: #c0392b; 
            grid-column: span 2; 
            margin-top: 5px;
            border: 1px solid #e74c3c;
            flex-direction: row;
            gap: 15px;
            padding: 20px;
            font-size: 16px;
        }

        #reloj {
            margin-top: 30px;
            font-weight: bold;
            color: #3498db;
            background: rgba(0,0,0,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #34495e;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛡️ PORTAL OPERATIVO</h1>
        <div class="aviso-registro">🔴 SOLO CAPTURA DE DATOS</div>
    </div>

    <div class="leyenda">
        "Firmeza, no prepotencia"
    </div>

    <div class="grid-operativa">
        <a href="cierre_turno.html" class="btn-registro cierre">
            <span>📋</span>
            REGISTRO<br>CIERRE TURNO
        </a>

        <a href="registro_acceso.html" class="btn-registro acceso">
            <span>📥</span>
            REGISTRO<br>ACCESOS
        </a>

        <a href="registro_motos.html" class="btn-registro motos">
            <span>🏍️</span>
            REGISTRO<br>MOTOS
        </a>

        <a href="registro_ventas.html" class="btn-registro ventas">
            <span>💰</span>
            REGISTRO<br>VENTAS
        </a>
      
      <a href="registro_de_patrullaje.html" class="btn-registro patrullaje">
            <span>💰</span>
            REGISTRO<br>PATRULLAJE
        </a>

       <a href="confirmacion_arribos.html" class="btn-registro arribos">
            <span>💰</span>
            REGISTRO<br>ARRIBOS
        </a>

        <a href="index.html" class="btn-registro checador">
            <span style="font-size: 28px; margin: 0;">📍</span>
            INICIO DE RECORRIDO - CHECADOR
        </a>
    </div>

    <div id="reloj">--:--:--</div>

    <script>
        function moverReloj() {
            const tiempo = new Date();
            const h = String(tiempo.getHours()).padStart(2, '0');
            const m = String(tiempo.getMinutes()).padStart(2, '0');
            const s = String(tiempo.getSeconds()).padStart(2, '0');
            document.getElementById('reloj').innerText = `HORA: ${h}:${m}:${s}`;
        }
        setInterval(moverReloj, 1000);
        moverReloj();
    </script>

</body>
</html>
